    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      // Initialize light mode from localStorage (before rendering)
      const lightMode = localStorage.getItem('lightMode')
      if (lightMode === 'true' || (lightMode === null && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light')
      }
    </script>

        .hero-gradient {
            background: linear-gradient(to right, rgba(26, 28, 28, 0.85) 0%, rgba(26, 28, 28, 0.4) 60%, transparent 100%);

        ::-webkit-scrollbar {

        }
